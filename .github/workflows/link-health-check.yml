name: Link Health Check

on:
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --max-redirects 5
            --accept 200,201,202,203,204,205,206,301,302,303,307,308,403,429
            --exclude "github.com"
            --exclude "img.shields.io"
            --exclude "images/"
            README.md
          fail: false

      - name: Report dead links
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="lychee-out.md"
          if [ ! -f "$REPORT" ] || [ ! -s "$REPORT" ]; then
            echo "No dead links found"
            EXISTING=$(gh issue list --search "in:title Dead links detected" --state open --json number --jq '.[0].number' 2>/dev/null)
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --body "Weekly check $(date -u +%Y-%m-%d): All links healthy."
              gh issue close "$EXISTING"
            fi
            exit 0
          fi
          BODY=$(cat "$REPORT")
          EXISTING=$(gh issue list --search "in:title Dead links detected" --state open --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Weekly update $(date -u +%Y-%m-%d): $BODY"
          else
            gh issue create --title "Dead links detected (weekly check)" --body "The weekly link health check found these dead links: $BODY Note: Some may be seasonal programs that return between cycles." --label "maintenance"
          fi
